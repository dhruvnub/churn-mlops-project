name: Churn GitHub Actions CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train Model
        run: |
          python train.py

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: churn-model
          path: churn_model.pkl

      - name: Build Success
        run: echo "GitHub Actions CI pipeline executed successfully"
