name: Churn GitHub Actions CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train Model
        run: |
          python train.py

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v3
        with:
          name: churn-model
          path: churn_model.pkl

      - name: Build Complete
        run: echo "GitHub Actions CI executed successfully"